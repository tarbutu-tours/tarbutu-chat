<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>תרבותו – לוח ניהול</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{--p:#1a6fa8;--pd:#0e4e7a;--pl:#e8f4fd;--ok:#27ae60;--warn:#f39c12;--danger:#e74c3c;--gray:#f0f4f8;--border:#dee2e6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Arial Hebrew',Arial,sans-serif;background:var(--gray);color:#343a40;min-height:100vh;direction:rtl}
.nav{background:var(--pd);color:#fff;height:56px;display:flex;align-items:center;padding:0 1.5rem;gap:.5rem;flex-shrink:0}
.nav-logo{font-size:1rem;font-weight:700;margin-left:1rem}.nav-logo span{color:#f0c040}
.nav-tab{background:transparent;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:0 .75rem;height:56px;font-size:.85rem;font-family:inherit;display:flex;align-items:center;gap:5px;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:#fff}.nav-tab.active{color:#fff;border-bottom-color:#f0c040}
.nav-tab i{font-size:17px}
.page{display:none;padding:1.25rem;max-width:1400px;margin:0 auto}.page.active{display:block}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden;margin-bottom:1.25rem}
.card-header{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:8px}
.card-title i{color:var(--p)}
.card-body{padding:1.25rem}
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:var(--p);color:#fff}.btn-primary:hover{background:var(--pd)}
.btn-success{background:var(--ok);color:#fff}.btn-success:hover{background:#1e8a4e}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:#555}.btn-outline:hover{background:var(--gray)}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:600}
.badge-ok{background:#e8f8ef;color:#1a5e35}.badge-warn{background:#fef9e7;color:#a05c00}.badge-danger{background:#fdecea;color:#a01010}
.main-grid{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px)}
.sidebar{background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-hdr{padding:.875rem 1rem;border-bottom:1px solid #f0f4f8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-title{font-weight:600;font-size:.9rem}
.conv-list{flex:1;overflow-y:auto}
.conv-item{padding:10px 12px;border-bottom:1px solid #f0f4f8;cursor:pointer;transition:all .15s;border-right:4px solid transparent}
.conv-item:hover{background:var(--pl)}.conv-item.active-conv{background:var(--pl);border-right-color:var(--p)}.conv-item.agent-mode{border-right-color:var(--ok)}
.conv-name{font-weight:600;font-size:.85rem}
.conv-preview{font-size:11px;color:#6c757d;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-meta{display:flex;gap:6px;margin-top:3px;align-items:center}
.conv-time{font-size:10px;color:#adb5bd;margin-right:auto}
.chat-area{display:flex;flex-direction:column;background:#f8fafc;overflow:hidden}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#adb5bd}
.chat-empty i{font-size:48px}
.chat-topbar{padding:.875rem 1.25rem;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;flex-direction:column;gap:2px}
.msg.bot{align-items:flex-end}.msg.user{align-items:flex-start}.msg.agent{align-items:flex-end}
.msg-bbl{max-width:78%;padding:8px 12px;border-radius:13px;font-size:13px;line-height:1.55;word-break:break-word}
.msg.bot .msg-bbl{background:var(--p);color:#fff;border-bottom-left-radius:3px}
.msg.user .msg-bbl{background:#fff;border:1px solid var(--border);color:#343a40;border-bottom-right-radius:3px}
.msg.agent .msg-bbl{background:#e8f8ef;border:1px solid #b0dfc0;color:#1a4a30;border-bottom-left-radius:3px}
.msg-meta{font-size:10px;color:#adb5bd;padding:0 3px}
.msg-sender{font-size:10px;font-weight:600;color:#1a7040;padding:0 3px}
.agent-bar{background:#e8f8ef;border-top:1px solid #b0dfc0;padding:7px 14px;font-size:12px;color:#1a5e35;display:none;align-items:center;gap:8px;flex-shrink:0}
.agent-bar.show{display:flex}
.agent-bar button{background:transparent;border:1px solid currentColor;border-radius:99px;padding:2px 10px;font-size:11px;cursor:pointer;font-family:inherit;color:inherit}
.input-area{padding:10px 14px;background:#fff;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0}
.input-area textarea{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;outline:none;font-family:inherit;direction:rtl;resize:none;height:42px;transition:border-color .2s}
.input-area textarea:focus{border-color:var(--p)}
.input-area textarea:disabled{background:#f8f9fa;color:#aaa}
.kb-tabs{display:flex;gap:4px;margin-bottom:1rem}
.kb-tab{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.kb-tab:hover{border-color:var(--p);color:var(--p)}
.kb-tab.active{background:var(--p);color:#fff;border-color:var(--p)}
.kb-section{display:none}.kb-section.active{display:block}
.kb-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.kb-form{display:flex;flex-direction:column;gap:10px}
.kb-form label{font-size:12px;color:#6c757d;margin-bottom:2px;display:block;font-weight:600}
.kb-form input,.kb-form textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:inherit;direction:rtl;transition:border-color .2s}
.kb-form input:focus,.kb-form textarea:focus{border-color:var(--p)}
.kb-list{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto}
.kb-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px}
.kb-item-info{flex:1;min-width:0}
.kb-item-name{font-weight:600;font-size:13px}
.kb-item-url{font-size:11px;color:#6c757d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kb-item-preview{font-size:11px;color:#6c757d;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.scan-bar{background:var(--pl);border:1px solid #b8d8f0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.scan-bar i{font-size:22px;color:var(--p);flex-shrink:0}
.scan-info{flex:1}
.scan-title{font-weight:600;font-size:14px}
.scan-sub{font-size:12px;color:#6c757d;margin-top:2px}
.progress-wrap{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:var(--p);border-radius:99px;transition:width .5s}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.25rem}
.stat-card{background:#fff;border-radius:12px;padding:1.25rem;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.stat-num{font-size:1.75rem;font-weight:700;color:var(--p)}
.stat-lbl{font-size:12px;color:#6c757d;margin-top:2px}
.toast{position:fixed;bottom:20px;left:20px;background:#343a40;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:9999;display:none;align-items:center;gap:8px}
.toast.show{display:flex}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}.kb-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">תרבותו <span>AI</span></div>
  <button class="nav-tab active" onclick="showPage('conversations')" id="tab-conversations"><i class="ti ti-messages"></i> שיחות</button>
  <button class="nav-tab" onclick="showPage('knowledge')" id="tab-knowledge"><i class="ti ti-database"></i> מאגר מידע</button>
  <button class="nav-tab" onclick="showPage('dashboard')" id="tab-dashboard"><i class="ti ti-chart-bar"></i> סטטוסים</button>
  <span style="font-size:12px;opacity:.7;margin-right:auto;margin-left:.5rem">נציג: <strong id="agent-name-display">נציג</strong></span>
  <button class="btn btn-sm btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="setAgentName()">שנה שם</button>
</nav>

<div class="page active" id="page-conversations">
  <div class="main-grid">
    <div class="sidebar">
      <div class="sidebar-hdr">
        <span class="sidebar-title">שיחות פעילות</span>
        <span class="badge badge-warn" id="conv-count">0</span>
      </div>
      <div class="conv-list" id="conv-list">
        <div style="padding:2rem;text-align:center;color:#adb5bd;font-size:13px">
          <i class="ti ti-messages" style="font-size:32px;display:block;margin-bottom:8px"></i>ממתין לשיחות...
        </div>
      </div>
    </div>
    <div class="chat-area" id="chat-area">
      <div class="chat-empty"><i class="ti ti-message-dots"></i><span>בחר שיחה מהרשימה</span></div>
    </div>
  </div>
</div>

<div class="page" id="page-knowledge">
  <div class="scan-bar">
    <i class="ti ti-world-search"></i>
    <div class="scan-info">
      <div class="scan-title" id="scan-title">מאגר מידע — סריקת אתר</div>
      <div class="scan-sub" id="scan-sub">טוען...</div>
      <div class="progress-wrap"><div class="progress-fill" id="scan-progress" style="width:0%"></div></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="triggerScan()"><i class="ti ti-refresh"></i> סרוק עכשיו</button>
  </div>
  <div class="kb-tabs">
    <button class="kb-tab active" onclick="showKbTab('trips')" id="kbtab-trips"><i class="ti ti-ship"></i> טיולים וקישורים</button>
    <button class="kb-tab" onclick="showKbTab('faq')" id="kbtab-faq"><i class="ti ti-help-circle"></i> שאלות שירות לקוחות</button>
  </div>
  <div class="kb-section active" id="kb-trips">
    <div class="kb-grid">
      <div class="card">
        <div class="card-header"><div class="card-title"><i class="ti ti-plus"></i> הוסף טיול</div></div>
        <div class="card-body">
          <div class="kb-form">
            <div><label>שם הטיול</label><input type="text" id="trip-name" placeholder="קרוז לאיסלנד — יולי 2026"></div>
            <div><label>קישור לדף הטיול באתר</label><input type="text" id="trip-url" placeholder="https://tarbutu.co.il/..."></div>
            <button class="btn btn-primary" onclick="addTrip()"><i class="ti ti-plus"></i> הוסף</button>
          </div>
          <hr style="margin:1rem 0;border:none;border-top:1px solid var(--border)">
          <label style="font-size:12px;color:#6c757d;font-weight:600;display:block;margin-bottom:6px">הוסף מספר קישורים בבת אחת:</label>
          <textarea id="trip-bulk" style="width:100%;height:80px;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;resize:vertical;font-family:monospace;direction:ltr" placeholder="https://tarbutu.co.il/קרוז-איסלנד/&#10;https://tarbutu.co.il/קרוז-יפן/"></textarea>
          <button class="btn btn-outline btn-sm" style="margin-top:6px" onclick="bulkAddTrips()"><i class="ti ti-list-check"></i> הוסף את כולם</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-ship"></i> טיולים במאגר <span id="trips-count" style="font-size:12px;color:#6c757d;font-weight:400">(0)</span></div>
          <button class="btn btn-sm btn-outline" onclick="clearTrips()"><i class="ti ti-trash"></i> נקה</button>
        </div>
        <div class="card-body"><div class="kb-list" id="trips-list"></div></div>
      </div>
    </div>
  </div>
  <div class="kb-section" id="kb-faq">
    <div class="kb-grid">
      <div class="card">
        <div class="card-header"><div class="card-title"><i class="ti ti-plus"></i> הוסף שאלה ותשובה</div></div>
        <div class="card-body">
          <div class="kb-form">
            <div><label>שאלה</label><input type="text" id="faq-q" placeholder="כיצד מבטלים טיול?"></div>
            <div><label>תשובה</label><textarea id="faq-a" rows="4" placeholder="לביטול טיול יש לפנות אלינו לפחות 60 יום לפני היציאה..."></textarea></div>
            <button class="btn btn-success" onclick="addFaq()"><i class="ti ti-plus"></i> הוסף שאלה</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-help-circle"></i> שאלות במאגר <span id="faq-count" style="font-size:12px;color:#6c757d;font-weight:400">(0)</span></div>
          <button class="btn btn-sm btn-outline" onclick="clearFaq()"><i class="ti ti-trash"></i> נקה</button>
        </div>
        <div class="card-body"><div class="kb-list" id="faq-list"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-dashboard">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="stat-convs">0</div><div class="stat-lbl">שיחות</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-trips">0</div><div class="stat-lbl">טיולים במאגר</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-faqs">0</div><div class="stat-lbl">שאלות שירות</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-size">0</div><div class="stat-lbl">תווים נסרקו</div></div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title"><i class="ti ti-info-circle"></i> סטטוס מערכת</div></div>
    <div class="card-body" id="system-status" style="font-size:14px;line-height:2.2">טוען...</div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check" style="color:var(--ok)"></i><span id="toast-msg"></span></div>

<script>
const API = '';
let agentName = localStorage.getItem('agentName') || 'נציג';
let activeConvId = null;
let convPoll = null;
let trips = JSON.parse(localStorage.getItem('kb-trips') || '[]');
let faqs = JSON.parse(localStorage.getItem('kb-faqs') || '[]');

document.getElementById('agent-name-display').textContent = agentName;

function setAgentName(){const n=prompt('שם נציג:',agentName);if(n){agentName=n;localStorage.setItem('agentName',n);document.getElementById('agent-name-display').textContent=n;}}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='knowledge'){renderTrips();renderFaqs();loadCacheStatus();}
  if(id==='dashboard')loadDashboard();
}

function showKbTab(tab){
  document.querySelectorAll('.kb-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.kb-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('kb-'+tab).classList.add('active');
  document.getElementById('kbtab-'+tab).classList.add('active');
}

function saveTrips(){localStorage.setItem('kb-trips',JSON.stringify(trips));syncToServer();}

function addTrip(){
  const name=document.getElementById('trip-name').value.trim();
  const url=document.getElementById('trip-url').value.trim();
  if(!url){showToast('נא להכניס קישור');return;}
  if(trips.find(i=>i.url===url)){showToast('קישור זה כבר קיים');return;}
  trips.push({name:name||url,url,addedAt:new Date().toISOString(),scanned:false});
  saveTrips();renderTrips();
  document.getElementById('trip-name').value='';
  document.getElementById('trip-url').value='';
  showToast('הטיול נוסף ✅');
}

function bulkAddTrips(){
  const text=document.getElementById('trip-bulk').value.trim();
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('http'));
  let added=0;
  lines.forEach(url=>{if(!trips.find(i=>i.url===url)){trips.push({name:url,url,addedAt:new Date().toISOString(),scanned:false});added++;}});
  saveTrips();renderTrips();
  document.getElementById('trip-bulk').value='';
  showToast('נוספו '+added+' קישורים ✅');
}

function removeTrip(url){trips=trips.filter(i=>i.url!==url);saveTrips();renderTrips();showToast('הוסר');}
function clearTrips(){if(!confirm('למחוק את כל הטיולים?'))return;trips=[];saveTrips();renderTrips();}

function renderTrips(){
  const el=document.getElementById('trips-list');
  document.getElementById('trips-count').textContent='('+trips.length+')';
  document.getElementById('stat-trips').textContent=trips.length;
  if(!trips.length){el.innerHTML='<div style="text-align:center;color:#adb5bd;padding:1.5rem;font-size:13px"><i class="ti ti-ship" style="font-size:28px;display:block;margin-bottom:6px"></i>אין טיולים במאגר</div>';return;}
  el.innerHTML=trips.map(item=>`
    <div class="kb-item">
      <div class="kb-item-info">
        <div class="kb-item-name">${item.name}</div>
        <div class="kb-item-url">${item.url}</div>
        <div style="margin-top:4px"><span class="badge ${item.scanned?'badge-ok':'badge-warn'}">${item.scanned?'✅ נסרק':'⏳ ממתין'}</span></div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="removeTrip('${item.url.replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i></button>
    </div>`).join('');
}

function saveFaqs(){localStorage.setItem('kb-faqs',JSON.stringify(faqs));syncToServer();}

function addFaq(){
  const q=document.getElementById('faq-q').value.trim();
  const a=document.getElementById('faq-a').value.trim();
  if(!q||!a){showToast('נא למלא שאלה ותשובה');return;}
  faqs.push({q,a,addedAt:new Date().toISOString()});
  saveFaqs();renderFaqs();
  document.getElementById('faq-q').value='';
  document.getElementById('faq-a').value='';
  showToast('השאלה נוספה ✅');
}

function removeFaq(idx){faqs.splice(idx,1);saveFaqs();renderFaqs();showToast('הוסרה');}
function clearFaq(){if(!confirm('למחוק את כל השאלות?'))return;faqs=[];saveFaqs();renderFaqs();}

function renderFaqs(){
  const el=document.getElementById('faq-list');
  document.getElementById('faq-count').textContent='('+faqs.length+')';
  document.getElementById('stat-faqs').textContent=faqs.length;
  if(!faqs.length){el.innerHTML='<div style="text-align:center;color:#adb5bd;padding:1.5rem;font-size:13px"><i class="ti ti-help-circle" style="font-size:28px;display:block;margin-bottom:6px"></i>אין שאלות במאגר</div>';return;}
  el.innerHTML=faqs.map((item,idx)=>`
    <div class="kb-item">
      <div class="kb-item-info">
        <div class="kb-item-name">❓ ${item.q}</div>
        <div class="kb-item-preview">💬 ${item.a}</div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="removeFaq(${idx})"><i class="ti ti-trash"></i></button>
    </div>`).join('');
}

async function syncToServer(){
  try{await fetch(API+'/api/kb-update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({trips,faqs})});}catch(e){}
}

async function triggerScan(){
  await syncToServer();
  try{await fetch(API+'/api/scan-now',{method:'POST'});}catch(e){}
  showToast('סריקה התחילה! תסתיים תוך כמה דקות...');
  setTimeout(loadCacheStatus,3000);
}

async function loadCacheStatus(){
  try{
    const r=await fetch(API+'/api/cache-status');
    const d=await r.json();
    const title=document.getElementById('scan-title');
    const sub=document.getElementById('scan-sub');
    const prog=document.getElementById('scan-progress');
    if(d.isScanning){
      title.textContent='🔄 סריקה פעילה...';
      sub.textContent='נסרקו '+d.pagesScanned+' מתוך '+d.totalPages+' עמודים';
      prog.style.width=Math.round((d.pagesScanned/d.totalPages)*100)+'%';
    }else if(d.hasCache){
      title.textContent='✅ מאגר הידע עדכני';
      sub.textContent='נסרק: '+(d.lastScanned?new Date(d.lastScanned).toLocaleString('he-IL'):'—')+' | '+d.contentLength.toLocaleString()+' תווים';
      prog.style.width='100%';
      trips.forEach(t=>{t.scanned=true;});
      localStorage.setItem('kb-trips',JSON.stringify(trips));
      renderTrips();
    }else{
      title.textContent='⚠️ טרם נסרק';
      sub.textContent='לחץ "סרוק עכשיו" להתחלה';
      prog.style.width='0%';
    }
    document.getElementById('stat-size').textContent=(d.contentLength||0).toLocaleString();
  }catch(e){}
}

function timeAgo(d){if(!d)return'';const diff=Math.floor((Date.now()-new Date(d))/1000);if(diff<60)return'עכשיו';if(diff<3600)return Math.floor(diff/60)+' דק\'';return Math.floor(diff/3600)+' שע\'';}

async function loadConversations(){
  try{
    const r=await fetch(API+'/api/conversations');
    const list=await r.json();
    document.getElementById('conv-count').textContent=list.length;
    document.getElementById('stat-convs').textContent=list.length;
    const el=document.getElementById('conv-list');
    if(!list.length){el.innerHTML='<div style="padding:2rem;text-align:center;color:#adb5bd;font-size:13px"><i class="ti ti-messages" style="font-size:32px;display:block;margin-bottom:8px"></i>אין שיחות עדיין</div>';return;}
    el.innerHTML=list.map(c=>`
      <div class="conv-item ${c.id===activeConvId?'active-conv':''} ${c.agentMode?'agent-mode':''}" onclick="openConv('${c.id}')">
        <div class="conv-name">${c.chatType==='support'?'🎧 שירות':'🚢 מכירות'} — לקוח ${c.id.slice(-4)}</div>
        <div class="conv-preview">${c.lastMessage||'שיחה חדשה'}</div>
        <div class="conv-meta">
          <span class="badge ${c.agentMode?'badge-ok':'badge-warn'}">${c.agentMode?'👤 נציג':'🤖 בוט'}</span>
          <span class="conv-time">${timeAgo(c.updatedAt)}</span>
        </div>
      </div>`).join('');
  }catch(e){}
}

async function openConv(id){
  activeConvId=id;clearInterval(convPoll);
  try{const r=await fetch(API+'/api/conversations/'+id);renderChat(await r.json());convPoll=setInterval(()=>refreshChat(id),3000);}catch(e){}
}

async function refreshChat(id){if(activeConvId!==id)return;try{const r=await fetch(API+'/api/conversations/'+id);renderChat(await r.json());}catch(e){}}

function renderChat(conv){
  const area=document.getElementById('chat-area');
  const msgs=conv.history||[];
  const typeLabel=conv.chatType==='support'?'🎧 שירות לקוחות':'🚢 מכירות';
  area.innerHTML=`
    <div class="chat-topbar">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--p);font-size:14px">ל</div>
      <div><div style="font-weight:700;font-size:.95rem">לקוח ${conv.id.slice(-4)} — ${typeLabel}</div>
      <div style="font-size:11px;color:#6c757d">${conv.agentMode?'👤 נציג בשיחה':'🤖 בוט מטפל'} · ${msgs.length} הודעות</div></div>
      <div style="margin-right:auto;display:flex;gap:8px">
        ${conv.agentMode
          ?`<button class="btn btn-sm btn-outline" onclick="releaseConv('${conv.id}')"><i class="ti ti-robot"></i> החזר לבוט</button>`
          :`<button class="btn btn-sm btn-success" onclick="takeoverConv('${conv.id}')"><i class="ti ti-hand-stop"></i> כנס לשיחה</button>`}
      </div>
    </div>
    <div class="msgs" id="msgs-${conv.id}">
      ${msgs.map(m=>`
        <div class="msg ${m.role}">
          ${m.role==='agent'?`<div class="msg-sender">${m.agentName||'נציג'}</div>`:''}
          <div class="msg-bbl">${(m.content||'').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
          <div class="msg-meta">${m.time?new Date(m.time).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}):''}</div>
        </div>`).join('')}
    </div>
    <div class="agent-bar ${conv.agentMode?'show':''}" id="ab-${conv.id}"><i class="ti ti-user-check"></i><span>אתה בשיחה כנציג</span></div>
    <div class="input-area">
      <textarea id="agent-input" placeholder="${conv.agentMode?'כתוב תשובה ללקוח...':'כנס לשיחה כדי לענות'}" ${conv.agentMode?'':'disabled'}
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAgentMsg('${conv.id}')}"></textarea>
      <button class="btn btn-primary" onclick="sendAgentMsg('${conv.id}')" ${conv.agentMode?'':'disabled'}><i class="ti ti-send"></i></button>
    </div>`;
  const msgsEl=document.getElementById('msgs-'+conv.id);
  if(msgsEl)msgsEl.scrollTop=msgsEl.scrollHeight;
}

async function takeoverConv(id){await fetch(API+'/api/conversations/'+id+'/takeover',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agentName})});openConv(id);}
async function releaseConv(id){await fetch(API+'/api/conversations/'+id+'/release',{method:'POST'});openConv(id);}
async function sendAgentMsg(id){
  const inp=document.getElementById('agent-input');
  const msg=inp.value.trim();if(!msg)return;inp.value='';
  await fetch(API+'/api/conversations/'+id+'/agent-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,agentName})});
  openConv(id);
}

async function loadDashboard(){
  loadCacheStatus();
  try{
    const r=await fetch(API+'/api/cache-status');
    const d=await r.json();
    document.getElementById('system-status').innerHTML=`
      <div>🔌 שרת: <strong style="color:var(--ok)">פעיל ✅</strong></div>
      <div>📦 מאגר ידע: <strong>${d.hasCache?'✅ עדכני':'⚠️ טרם נסרק'}</strong></div>
      <div>🚢 טיולים במאגר: <strong>${trips.length}</strong></div>
      <div>❓ שאלות שירות: <strong>${faqs.length}</strong></div>
      <div>📝 תווים נסרקו: <strong>${(d.contentLength||0).toLocaleString()}</strong></div>
      <div>🕐 סריקה אחרונה: <strong>${d.lastScanned?new Date(d.lastScanned).toLocaleString('he-IL'):'—'}</strong></div>
      <div>🔄 סריקה אוטומטית: <strong>כל 24 שעות</strong></div>`;
  }catch(e){document.getElementById('system-status').innerHTML='<span style="color:var(--danger)">❌ לא ניתן להתחבר לשרת</span>';}
}

function showToast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

loadConversations();
setInterval(loadConversations,5000);
renderTrips();renderFaqs();
loadCacheStatus();
setInterval(loadCacheStatus,15000);
</script>
</body>
</html>
